<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil bearbeiten</title>
   <link rel="shortcut icon" href="home.png" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>

<body darkmode="off">

<header>

<h1>
<a href="index.html">Number Guessing Game</a> / Profil bearbeiten
</h1>

</header>

<main>

<section class="container">

<h2>Profil bearbeiten</h2>

<img
id="previewImage"
src="./assets/default-profile.png"
alt="Profilbild"
width="150"
height="150"
style="
border-radius:50%;
object-fit:cover;
border:4px solid white;
">

<br><br>

<label>Profilbild auswählen</label><br>
<input type="file" id="imageUpload" accept="image/*">

<br><br>

<label>Benutzername</label><br>
<input
type="text"
id="usernameInput"
maxlength="20"
placeholder="Benutzername">

<br><br>

<label>Über mich</label><br>

<input
type="text"
id="aboutInput"
maxlength="150"
rows="5"
placeholder="Erzähle etwas über dich..."></input>

<br><br>

<button onclick="saveProfile()">
Profil Speichern
</button>

<a href="profile.html">
<button>
Profil ansehen
</button>
</a>

<br>

<button onclick="resetProfile()">
🗑 Profil zurücksetzen
</button>

<button onclick="resetAllStats()">
🗑 Alle Statistiken löschen
</button>
<p id="resetMessage"></p>



</section>

</main>

<footer>

<p>2013–2026 Ich halt!</p>

</footer>

<script src="profile.js"></script>
<script src="script.js"></script>

</body>
</html>
